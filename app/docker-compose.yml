version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ponial-app
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
    environment:
      - APP_ENV=development
      - APP_PORT=8080
      - GIN_MODE=debug
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=ponial_user
      - DB_PASSWORD=ponial_password
      - DB_NAME=ponial_db
    command: air -c .air.toml
    depends_on:
      - postgres
    networks:
      - ponial-network

  postgres:
    image: postgres:15-alpine
    container_name: ponial-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=ponial_user
      - POSTGRES_PASSWORD=ponial_password
      - POSTGRES_DB=ponial_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ponial-network

volumes:
  go-mod-cache:
  postgres-data:

networks:
  ponial-network:
    driver: bridge